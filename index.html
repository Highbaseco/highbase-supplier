<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Professional Page</title>
    <style>
        :root {
            --primary: #1e5bb8;
            --bg: #f4f7fb;
            --text: #333;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: var(--primary);
            margin-bottom: 1rem;
        }

        p {
            margin-bottom: 1.5rem;
            color: #666;
        }

        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background-color: #164a99;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome</h1>
        <p>This is a simple, clean HTML page designed to be used as a starting point for your web projects.</p>
        <button class="btn" onclick="alert('Hello!')">Click Me</button>
    </div>

</body>
</html>
